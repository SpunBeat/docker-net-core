services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command: dotnet watch run --urls=http://0.0.0.0:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SSL Mode=${POSTGRES_SSL_MODE:-Prefer}
    volumes:
      - .:/src:cached
